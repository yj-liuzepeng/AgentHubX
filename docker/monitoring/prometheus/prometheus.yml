global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: agentchat
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI 应用监控
  - job_name: 'agentchat-api'
    static_configs:
      - targets: ['host.docker.internal:7860']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter（主机监控）
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
